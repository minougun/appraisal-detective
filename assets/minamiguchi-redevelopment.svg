<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Minamiguchi redevelopment site</title>
  <desc id="desc">A station south-exit redevelopment site with old warehouses, active tenants, narrow alley, flood marker, and zoning height guide lines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3c342f"/>
      <stop offset="1" stop-color="#201714"/>
